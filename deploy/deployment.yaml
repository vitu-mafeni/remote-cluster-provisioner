apiVersion: apps/v1
kind: Deployment
metadata:
  name: remote-cluster-provisioner
  namespace: remote-cluster-provisioner-system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: remote-cluster-provisioner
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: remote-cluster-provisioner
  strategy:
    type: Recreate  # single-replica controller; avoid two instances during rollout
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: remote-cluster-provisioner
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: remote-cluster-provisioner
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: manager
          # Replace <ORG> with your GitHub organisation / username.
          # The workflow publishes to ghcr.io/<github.repository> (e.g. ghcr.io/vitu/remote-cluster-provisioner).
          image: ghcr.io/<ORG>/remote-cluster-provisioner:latest
          imagePullPolicy: Always
          command: [/manager]
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8443
            - --metrics-secure=true

          ports:
            - name: healthz
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 8443
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

          env:
            # Inject namespace so the controller can scope leader-election leases.
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          # The distroless image has no /tmp; mount one for scratch space if needed.
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      # Keep the controller on control-plane nodes by preference, but allow any node.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists

      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
