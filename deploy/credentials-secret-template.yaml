# ─────────────────────────────────────────────────────────────────────────────
# Credential Secrets — fill in real values, then kubectl apply -f this file.
# These are NOT mounted into the controller pod; the controller reads them via
# the Kubernetes API (it has get/list/watch on secrets cluster-wide).
# ─────────────────────────────────────────────────────────────────────────────

# 1. AWS credentials for EC2 provisioning.
#    Referenced by NodeProvision CR → spec.credentialsRef.name
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: remote-cluster-provisioner-system
type: Opaque
stringData:
  awsAccessKeyId: "REPLACE_WITH_ACCESS_KEY_ID"
  awsSecretAccessKey: "REPLACE_WITH_SECRET_ACCESS_KEY"
  # awsSessionToken: "REPLACE_IF_USING_TEMPORARY_CREDENTIALS"

---

# 2. SSH private key for the VPN/WireGuard server.
#    Referenced by RemoteCluster CR → spec.vpnSshCredentialsRef.name
#    The controller SSHes to this host to add/remove WireGuard peers.
apiVersion: v1
kind: Secret
metadata:
  name: vpn-server-ssh-key
  namespace: remote-cluster-provisioner-system
type: Opaque
stringData:
  # Paste the full PEM private key (-----BEGIN OPENSSH PRIVATE KEY----- ... -----END ...)
  privateKey: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    REPLACE_WITH_VPN_SERVER_SSH_PRIVATE_KEY
    -----END OPENSSH PRIVATE KEY-----

---

# 3. SSH private key used to access provisioned worker nodes.
#    Referenced by NodeProvision CR → spec.credentialsRef.name  (same secret as AWS
#    when the EC2 key pair private key is stored there, or a separate secret).
#    Also referenced by RemoteCluster CR → spec.auth.sshPrivateKeySecretRef.name
#    for bare-metal control-plane and worker nodes.
apiVersion: v1
kind: Secret
metadata:
  name: node-ssh-key
  namespace: remote-cluster-provisioner-system
type: Opaque
stringData:
  privateKey: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    REPLACE_WITH_NODE_SSH_PRIVATE_KEY
    -----END OPENSSH PRIVATE KEY-----

---

# 4. Container registry credentials for GPU image pre-pull (optional).
#    Referenced by RemoteCluster CR → spec.nodeInfo.softwareConfig.imagePullSecretRef.name
#    Referenced by NodeProvisionNetConfig CR → spec.softwareConfig.imagePullSecretRef.name
#    Only required if nodes need to pre-pull images from a private registry.
apiVersion: v1
kind: Secret
metadata:
  name: image-pull-credentials
  namespace: remote-cluster-provisioner-system
type: Opaque
stringData:
  username: "REPLACE_WITH_REGISTRY_USERNAME"
  password: "REPLACE_WITH_REGISTRY_PASSWORD_OR_TOKEN"
