apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: remote-cluster-provisioner-system

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - role.yaml
  - rolebinding.yaml
  - deployment.yaml

# Override the image tag for a specific release:
#   kubectl apply -k deploy/ --image=ghcr.io/<ORG>/remote-cluster-provisioner:v1.2.3
# Or set it here:
# images:
#   - name: ghcr.io/<ORG>/remote-cluster-provisioner
#     newTag: v1.2.3
