apiVersion: infra.dcn.ssu.ac.kr/v1
kind: RemoteCluster
metadata:
  labels:
    app.kubernetes.io/name: remote-cluster-provisioner
    app.kubernetes.io/managed-by: kustomize
  name: remotecluster-sample
spec:
  clusterName: "edge"
  host: "192.168.3.234"
  port: 22
  user: "ubuntu"

  auth:
    passwordSecretRef:
      name: remote-cluster-credentials
      key: password

  kubernetes:
    version: "v1.34.2"
  gitConfig:
    enable: "true"
    gitServer: "http://192.168.3.99:31810"
    gitUsername: "nephio"
    upstreamPlatformRepo: "catalog-workloads-mlplatform"
    packageRevision: "v1.0.0"
